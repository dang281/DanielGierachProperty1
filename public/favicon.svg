<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- GieMann seal: full-bleed deep-gold disc + cream DG monogram.
       Full-bleed background means Google's circular crop shows a clean disc
       with no clipped corners; the monogram is sized and centred inside the
       safe zone so it never gets cut off at small sizes. -->
  <rect width="32" height="32" rx="6" fill="#6b4610"/>
  <text x="16" y="21.2"
    font-family="'Fraunces','Playfair Display','Cormorant Garamond',Georgia,'Times New Roman',serif"
    font-size="14"
    font-weight="700"
    fill="#f2ead4"
    text-anchor="middle"
    letter-spacing="-0.3">DG</text>
</svg>
