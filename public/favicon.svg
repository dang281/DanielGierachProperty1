<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- GieMann palette: warm gold tile + cream DG monogram (rolled out 2026-07-12). -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b98229"/>
      <stop offset="100%" stop-color="#6b4610"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#g)"/>
  <!-- DG monogram: upright serif to match the site wordmark. Fraunces at the
       front of the stack when the browser has it (marketing site loads it);
       Georgia as the always-available fallback. -->
  <text x="16" y="22"
    font-family="'Fraunces','Playfair Display','Cormorant Garamond',Georgia,'Times New Roman',serif"
    font-size="15"
    font-weight="600"
    fill="#f2ead4"
    text-anchor="middle"
    letter-spacing="0.3">DG</text>
</svg>
