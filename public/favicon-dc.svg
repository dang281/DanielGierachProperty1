<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- GieMann palette: warm cream tile + gold D&C monogram, matching the
       site favicon style (updated 2026-07-13). -->
  <rect width="32" height="32" rx="6" fill="#e6d9bd"/>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5" fill="none" stroke="#b98229" stroke-width="1"/>
  <!-- D&C monogram in italic serif. Fraunces at the front of the stack when
       the browser has it (marketing site loads it); Georgia italic as the
       always-available fallback so the mark stays elegant offline too. -->
  <text x="16" y="21"
    font-family="'Fraunces','Playfair Display','Cormorant Garamond',Georgia,'Times New Roman',serif"
    font-size="12.5"
    font-style="italic"
    font-weight="600"
    fill="#b98229"
    text-anchor="middle"
    letter-spacing="-0.02em">D&amp;C</text>
</svg>
