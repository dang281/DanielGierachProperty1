<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- GieMann palette: dark ink surface + warm gold monogram -->
  <rect width="32" height="32" fill="#191817"/>
  <rect x="2" y="2" width="28" height="28" fill="none" stroke="#b98229" stroke-width="0.75"/>
  <!-- D&C monogram in italic serif. Fraunces at the front of the stack when
       the browser has it (marketing site loads it); Georgia italic as the
       always-available fallback so the mark stays elegant offline too. -->
  <text x="16" y="22"
    font-family="'Fraunces','Playfair Display','Cormorant Garamond',Georgia,'Times New Roman',serif"
    font-size="14.5"
    font-style="italic"
    font-weight="600"
    fill="#b98229"
    text-anchor="middle"
    letter-spacing="-0.02em">D&amp;C</text>
</svg>
