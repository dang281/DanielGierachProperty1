<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark base, full bleed (browser/OS rounds at its preferred radius) -->
  <rect width="32" height="32" fill="#1c1917"/>
  <!-- Inset gold border -->
  <rect x="2" y="2" width="28" height="28" fill="none" stroke="#c4912a" stroke-width="0.75"/>
  <!-- CL monogram: matches DG variant — Noto Serif, bold, upright -->
  <text x="16" y="22"
    font-family="'Noto Serif',Georgia,'Times New Roman',serif"
    font-size="15"
    font-weight="700"
    fill="#c4912a"
    text-anchor="middle"
    letter-spacing="0.3">CL</text>
</svg>
