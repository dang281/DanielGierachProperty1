<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- GieMann palette: full-bleed cream tile + rounded gold border + gold check.
       Home-screen icon for the presale checklist tool. Full-bleed fill (no
       rounded corners on the base rect) so the OS mask has no transparent
       corners to render black; the gold border echoes favicon.svg / icon-map.svg. -->
  <rect width="512" height="512" fill="#e6d9bd"/>
  <rect x="24" y="24" width="464" height="464" rx="80" fill="none" stroke="#b98229" stroke-width="16"/>
  <path
    d="M 148 258 L 224 336 L 380 176"
    fill="none"
    stroke="#b98229"
    stroke-width="52"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
