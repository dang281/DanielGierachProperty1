<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- GieMann palette: warm cream tile + gold MAP wordmark. Home-screen icon
       for the Brisbane map tools (property / infrastructure / zoning / water /
       stormwater). Mirrors favicon.svg so the installed app matches the site. -->
  <rect width="32" height="32" rx="6" fill="#e6d9bd"/>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5" fill="none" stroke="#b98229" stroke-width="1"/>
  <!-- MAP wordmark: upright serif to match the site (Fraunces when present,
       Georgia as the always-available fallback). Three letters, so a touch
       smaller and tighter than the DG monogram. -->
  <text x="16" y="21"
    font-family="'Fraunces','Playfair Display','Cormorant Garamond',Georgia,'Times New Roman',serif"
    font-size="10.5"
    font-weight="600"
    fill="#b98229"
    text-anchor="middle"
    letter-spacing="0.2">MAP</text>
</svg>
